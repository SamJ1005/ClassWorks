<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A fully responsive modern habit tracker">
    <title>Responsive Habit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Habstyles.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header style="position: relative;">
            <div class="user-controls">
                <span id="welcome-user"></span>
                <button id="logout-btn" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
                    </svg>
                    Logout
                </button>
            </div>
            <div class="header-text">
                <h1>Habit Tracker</h1>
                <p id="month-display">Current Month</p>
                <p style="color: #129ef0">Build better habits one day at a time.
                    <br>Also be truthful to yourself and try not to cheat the Checkboxes
                </p>
            </div>
        </header>

        <section class="add-habit-section card">
            <h3 class="section-title">Enter your New Habit</h3>
            <form id="add-habit-form">
                <input type="text" id="new-habit-input" placeholder="What habit to build?" required autocomplete="off">
                <button type="submit" id="add-btn" title="Add Habit">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </button>
            </form>
        </section>

        <!-- List and Calendar in center -->
        <section class="habits-table-wrapper card">
            <div class="table-scroll">
                <div class="habits-table" id="habits-table">
                    <!-- Header Row injected by JS -->
                    <div class="habit-row header-row" id="days-header"></div>

                    <!-- Habits body -->
                    <div id="habits-list"></div>
                </div>
            </div>
            <p class="calendar-note"> Note that you can select the checkboxes and do changes from current date to past
                2 Days</p>
        </section>

        <!-- Overall progress layout below table -->
        <section class="overall-progress-container card">
            <h2 class="section-title">Monthly Progress Breakdown</h2>
            <div class="pie-layout">
                <div class="very-big-pie-chart" id="overall-pie">
                    <div class="inner-circle">
                        <span id="overall-percentage">0%</span>
                    </div>
                </div>
                <div class="pie-legend" id="pie-legend">
                </div>
            </div>
        </section>
    </div>

    <!-- Template for a Habit Row -->
    <template id="habit-row-template">
        <div class="habit-row">
            <div class="habit-name-col">
                <div class="habit-primary-info">
                    <div class="habit-title-row">
                        <div class="color-dot"></div>
                        <h3 class="habit-name">Habit Name</h3>
                    </div>
                    <div class="habit-mini-progress">0/31 days</div>
                </div>
                <div class="habit-actions">
                    <!-- Small percentage ring -->
                    <div class="small-progress-circle">
                        <div class="small-inner-circle">
                            <span class="small-percentage">0%</span>
                        </div>
                    </div>
                    <button class="delete-btn" title="Delete Habit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="days-container">
                <!-- Checkboxes will be inserted here -->
            </div>
        </div>
    </template>

    <script src="Hascripts.js"></script>
</body>

</html>
